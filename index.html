<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/jersey.svg" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content, minimum-scale=1"
    />
    <title>Jerseys</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("theme") || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
          var themeColor = dark ? "#1c1b18" : "#f9f9f7";
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute("content", themeColor);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
